name: Deploy EKS Cluster

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to trigger this manually from the GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1 # Change this to your preferred AWS region

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.10.0 # Adjust to your matching local terraform version

    - name: Initialize Backend
      run: |
        cd backend-setup
        terraform init
        terraform apply -auto-approve
        
    - name: Run Cluster Creation Script
      run: |
        chmod +x create-cluster.sh
        ./create-cluster.sh